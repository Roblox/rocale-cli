name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 1
    strategy:
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-latest
            artifact_path: "build/rocale-cli"
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            artifact_path: "build/rocale-cli"
          - os: windows
            arch: x86_64
            runner: windows-latest
            artifact_path: "build/rocale-cli.exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up foreman.toml for publishing
        run: |
          cp foreman-release.toml foreman.toml

      - name: Get foreman and run foreman install
        uses: Roblox/setup-foreman@v3
        with:
          version: "^1.0.0"
          token: ${{ secrets.GITHUB_TOKEN }}
          allow-external-github-orgs: true

      - name: Build release artifacts
        run: |
          lute scripts/build ${{ github.ref_name }} ${{ github.sha }}

      - uses: actions/upload-artifact@v5
        with:
          name: rocale-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_path }}

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Zip release artifacts
        run: |
          zip -rj rocale-cli-macos-arm64.zip ./artifacts/rocale-cli-macos-arm64/*
          zip -rj rocale-cli-linux-x86_64.zip ./artifacts/rocale-cli-linux-x86_64/*
          zip -rj rocale-cli-windows-x86_64.zip ./artifacts/rocale-cli-windows-x86_64/*

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: rocale-cli-macos-arm64.zip
          asset_name: rocale-cli-macos-arm64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: rocale-cli-linux-x86_64.zip
          asset_name: rocale-cli-linux-x86_64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: rocale-cli-windows-x86_64.zip
          asset_name: rocale-cli-windows-x86_64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
